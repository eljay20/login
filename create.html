<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE ACCOUNT</title>
</head>
<body>
    <div class="crete-box">
        <form action="">
            <div class="create-header">
                <header><b>CREATE ACCOUNT</b></header>
            </div>
            <div class="input-box">
                <input type="text" class="input-field" placeholder="Fullname" required>
                <i class='bx bxs-user-circle'></i>
            </div>
            <div class="input-box">
                <input type="text" class="input-field" placeholder="Email address" required>
                <i class='bx bxs-user-circle'></i>
            </div>
            <div class="input-box">
                <input type="password" class="input-field" placeholder="Password" required>
                <i class='bx bxs-lock-alt' ></i>
            </div>
            <div class="forgot">
            <section>
                <input type="checkbox" id="check">
                <label for="check">Remember me</label>
            </section>
            <section>
                <a href="#">Forgot Password</a>
            </section>
            </div>
                <button class="submit-btn" id="submit"> <label for="submit">Sign In</label></button>
            <div class="sign-up-link">
                <p>Don't have an account? <a href="#">Sign Up</a></p>
            </div>
    </form>
    </div>
</body>
</html>
